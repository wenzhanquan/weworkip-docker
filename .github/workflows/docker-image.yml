name: WeWorkIP Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - "**.md"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # 判断是否为 Tag 发布
      IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 引入 QEMU 主要是为了后续如果需要构建 ARM 架构镜像做准备（MediaWarp规范）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 规范的 Buildx 设置
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 💡 解决报错的核心：严格对齐 MediaWarp 的登录规范
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          registry: docker.io
          logout: true

      # 自动生成镜像的 Tag 和 Label 标签
      # 如果是 main 分支推送，打上 latest 和 edge 标签
      # 如果是 v1.0.0 推送，打上 v1.0.0 和 latest 标签
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: wenzhanquan/weworkip
          tags: |
            type=edge,branch=main
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      # 执行 Docker 构建并推送
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 如果需要构建多架构，可以取消下面这行的注释
          # platforms: linux/amd64,linux/arm64
